    <div class="w-full max-w-xl rounded-[28px] border border-slate-200 bg-white p-6 shadow-soft sm:p-8">
        <h2 class="text-2xl font-semibold text-slate-900">欢迎回来</h2>
        <form method="post" class="mt-6 space-y-5">
            {% csrf_token %}
            
            <label class="form-control block">
                <span class="mb-2 block text-sm font-medium text-slate-700">邮箱</span>
                {{ form.email }}
                {% for error in form.email.errors %}
                <span class="mt-1 block text-sm text-rose-600">{{ error}}</span>
                {% endfor %}
            </label>
            <label class="form-control block">
                <span class="mb-2 block text-sm font-medium text-slate-700">密码</span>
                {{ form.password }}
                {% for error in form.password.errors %}<span class="mt-1 block text-sm text-rose-600">{{ error
                        }}</span>{% endfor %}
            </label>
            <div class="flex items-center justify-between text-rose-600">
                {{ form.non_field_errors }}
            </div>
            <button type="submit" class="btn btn-primary h-11 w-full rounded-lg text-white">登录</button>
        </form>
        <p class="mt-5 text-sm text-slate-500">还没有账号？<a href="{% url 'accounts:register' %}"
                class="font-medium text-sky-700">立即注册</a></p>
    </div>

</section>
